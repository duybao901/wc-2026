services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wc2026}
      POSTGRES_USER: ${POSTGRES_USER:-wc2026}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wc2026} -d ${POSTGRES_DB:-wc2026}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-wc2026}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wc2026}
      CORS_ORIGIN: ${APP_SCHEME:-http}://${APP_DOMAIN}
      SCORE_SYNC_ENABLED: ${SCORE_SYNC_ENABLED:-true}
      SCORE_SYNC_URL: ${SCORE_SYNC_URL}
      SCORE_SYNC_API_KEY: ${SCORE_SYNC_API_KEY}
      SCORE_SYNC_AUTH_HEADER: ${SCORE_SYNC_AUTH_HEADER:-X-Auth-Token}
      SCORE_SYNC_ON_START: ${SCORE_SYNC_ON_START:-false}
      SCORE_SYNC_DAILY_LIMIT: ${SCORE_SYNC_DAILY_LIMIT:-95}
      SCORE_SYNC_PER_MINUTE_LIMIT: ${SCORE_SYNC_PER_MINUTE_LIMIT:-10}
      SCORE_SYNC_PRE_MATCH_INTERVAL_MINUTES: ${SCORE_SYNC_PRE_MATCH_INTERVAL_MINUTES:-30}
      SCORE_SYNC_LIVE_INTERVAL_MINUTES: ${SCORE_SYNC_LIVE_INTERVAL_MINUTES:-10}
      SCORE_SYNC_FINAL_INTERVAL_MINUTES: ${SCORE_SYNC_FINAL_INTERVAL_MINUTES:-3}
      SCORE_SYNC_POST_MATCH_INTERVAL_MINUTES: ${SCORE_SYNC_POST_MATCH_INTERVAL_MINUTES:-15}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${API_SCHEME:-http}://${API_DOMAIN}
        VITE_POLL_INTERVAL_MS: ${VITE_POLL_INTERVAL_MS:-5000}
    restart: unless-stopped
    depends_on:
      - api

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.reverse-proxy.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      NGINX_ENVSUBST_FILTER: "^(APP_DOMAIN|API_DOMAIN)$"
    depends_on:
      - web
      - api

volumes:
  postgres-data:
