services:
  postgres:
    image: postgres:16-alpine
    container_name: wc2026-postgres
    environment:
      POSTGRES_DB: wc2026
      POSTGRES_USER: wc2026
      POSTGRES_PASSWORD: wc2026
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc2026 -d wc2026"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
